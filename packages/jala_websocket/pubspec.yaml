name: jala_websocket
description: >
  WebSocketChannel wrapper for Jala: connection lifecycle and frame
  timelines (direction, size, preview). Frames are not throttled.
version: 0.5.1
homepage: https://github.com/ketok-id/jala-flutter
repository: https://github.com/ketok-id/jala-flutter
issue_tracker: https://github.com/ketok-id/jala-flutter/issues
topics:
  - network
  - debugging
  - devtools
  - websocket

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  jala_core: ^0.5.1
  stream_channel: ^2.1.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
