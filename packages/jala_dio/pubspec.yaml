name: jala_dio
description: Dio interceptor for Jala, the in-app Flutter network inspector. Captures requests, responses, and errors, and supports one-tap replay.
version: 0.5.0
repository: https://github.com/ketok-id/jala-flutter
topics: [network, debugging, devtools, http, dio]

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  dio: ^5.9.0
  jala_core: ^0.5.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
