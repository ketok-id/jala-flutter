name: jala_graphql
description: GraphQL link for Jala, the in-app Flutter network inspector. Operation-aware capture (name, query, variables, response) for any gql_link-based client, including graphql_flutter and ferry.
version: 0.5.0
repository: https://github.com/ketok-id/jala-flutter
topics:
  - network
  - debugging
  - devtools
  - graphql

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  gql: ^1.0.0
  gql_exec: ^1.1.0
  gql_link: ^1.0.0
  jala_core: ^0.5.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
