name: jala
description: >
  In-app Flutter network inspector with replay, filter grammar, redaction,
  throttling, and session share. Facade over jala_core + jala_ui.
version: 0.5.3
homepage: https://github.com/ketok-id/jala-flutter
repository: https://github.com/ketok-id/jala-flutter
issue_tracker: https://github.com/ketok-id/jala-flutter/issues
topics: [network, debugging, devtools, http, dio]

environment:
  sdk: ^3.11.0
  flutter: ">=3.35.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  jala_core: ^0.5.3
  jala_ui: ^0.5.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

screenshots:
  - description: "Inspector call list (dark theme)"
    path: screenshots/list-dark.png
  - description: "Call detail overview tab"
    path: screenshots/detail-overview.png
  - description: "Redacted request headers at capture time"
    path: screenshots/redacted-headers.png
  - description: "Demo: filter, inspect, and replay traffic"
    path: screenshots/demo.gif

flutter:
