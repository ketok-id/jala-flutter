name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test jala_core
        run: dart test
        working-directory: packages/jala_core

      - name: Test jala_dio
        run: dart test
        working-directory: packages/jala_dio

      - name: Test jala_http
        run: dart test
        working-directory: packages/jala_http

      - name: Test jala_graphql
        run: dart test
        working-directory: packages/jala_graphql

      - name: Test jala_websocket
        run: dart test
        working-directory: packages/jala_websocket

      - name: Test jala_ui
        run: flutter test
        working-directory: packages/jala_ui

      - name: Test jala
        run: flutter test
        working-directory: packages/jala

      - name: Test jala_example
        run: flutter test
        working-directory: examples/jala_example
